name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build gate + tests
    runs-on: macos-15

    env:
      # The shared "Echo" scheme builds the iOS app + embedded watch app + widget.
      IOS_DESTINATION: "platform=iOS Simulator,name=iPhone 16"
      WATCH_DESTINATION: "platform=watchOS Simulator,name=Apple Watch Series 10 (46mm)"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin the toolchain to Xcode 26.x so CI compiles against the same SDK the
      # project is developed and shipped with (the maintainer's machine runs
      # Xcode 26 / iOS 26 SDK). The macos-15 runner installs several Xcodes but
      # DEFAULTS to 16.4 (iOS 18 / watchOS 11.5 SDK), whose AVFoundation lacks
      # 26-era symbols such as `AVAudioSession.CategoryOptions.allowBluetoothHFP`
      # — so a tree that builds locally fails the gate here. Building with the
      # newest SDK and deploying down to the iOS 18 / watchOS 11 floor is the
      # standard arrangement. '26' resolves to the newest installed 26.x
      # (resilient to runner-image updates) without ever jumping to a future major.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          # Namespaced by toolchain: DerivedData and module caches are not portable
          # across Xcode major versions, so a cache saved by an earlier 16.4 run
          # must not be restored into a 26.x build.
          key: ${{ runner.os }}-xcode26-spm-${{ hashFiles('**/Package.resolved', 'Echo.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode26-spm-

      - name: Diagnostics
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -E "iPhone|Watch" || true

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

      # ── BUILD GATE ──────────────────────────────────────────────────────────
      # Compile every shipping target AND the test target before running a single
      # test. This is the gate for non-compiling commits — e.g. the @frozen-on-an-
      # internal-struct error and the missing `import Foundation` in a test file,
      # both of which merged uncaught (CODE_AUDIT.md §10 rec. 5; §5.1).
      # `build-for-testing` compiles app + widget + embedded watch app + EchoTests
      # without booting a simulator, so it fails fast and clearly on compile errors.
      - name: Build for testing — Echo (iOS app + widget + watch + tests)
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Echo.xcodeproj \
            -scheme Echo \
            -destination "$IOS_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build — Echo macOS
        run: |
          set -o pipefail
          xcodebuild build \
            -project Echo.xcodeproj \
            -scheme "Echo macOS" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      # ── TESTS ───────────────────────────────────────────────────────────────
      # Run the products built above (test-without-building reuses them, so no
      # recompile). Catches runtime/logic regressions a compile-only gate misses —
      # e.g. the card_type NOT NULL insert failures across the flashcard subsystem.
      # NOTE: unlike the build steps, the test steps run WITHOUT -quiet so a failing
      # test's name and assertion appear in the CI log — a quiet test gate can't be
      # diagnosed from its output.
      - name: Test — EchoTests (iOS)
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Echo.xcodeproj \
            -scheme Echo \
            -destination "$IOS_DESTINATION" \
            -only-testing:EchoTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Test — Echo Watch AppTests (watchOS)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Echo.xcodeproj \
            -scheme "Echo Watch App" \
            -destination "$WATCH_DESTINATION" \
            -only-testing:"Echo Watch AppTests" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO
