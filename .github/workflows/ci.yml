name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', 'Echo.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run iOS Tests
        run: |
          xcodebuild test \
            -project Echo.xcodeproj \
            -scheme Echo \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -quiet

      - name: Build watchOS
        run: |
          xcodebuild build-for-testing \
            -project Echo.xcodeproj \
            -scheme "Echo Watch App" \
            -destination "platform=watchOS Simulator,name=Apple Watch Series 10 (46mm),OS=latest" \
            -quiet

      - name: Build macOS Target
        run: |
          xcodebuild build \
            -project Echo.xcodeproj \
            -scheme "Echo macOS" \
            -destination "platform=macOS" \
            -quiet
