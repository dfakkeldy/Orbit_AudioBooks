name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', 'Echo.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build iOS (simulator SDK, no test execution)
        run: |
          xcodebuild build \
            -project Echo.xcodeproj \
            -scheme Echo \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -30

      - name: Build macOS
        run: |
          xcodebuild build \
            -project Echo.xcodeproj \
            -scheme "Echo macOS" \
            -destination "platform=macOS" \
            -quiet
